<!DOCTYPE html>
<html lang="en">
  <head>
    <link type="text/css" rel="stylesheet" href="style.css"/>
  </head>
  <body>
    <!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNova Imperium | Luxury Cars</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top luxury-nav shadow-lg">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="#">
                <i class="fas fa-crown me-2"></i>AUTONOVA IMPERIUM
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <div class="ms-auto d-flex align-items-center gap-2 py-3 py-lg-0">
                    
                    <input type="text" id="searchInput" class="form-control form-control-sm bg-dark text-light border-secondary" placeholder="Buscar vehículo...">

                    <select id="categoryFilter" class="form-select form-select-sm bg-dark text-light border-secondary" style="min-width: 140px;">
                        <option value="all">Todas las categorías</option>
                        <option value="SUV">SUV</option>
                        <option value="Sedan">Sedán</option>
                        <option value="Deportivo">Deportivo</option>
                    </select>

                    <span id="welcomeUser" class="text-light mx-2 small fw-bold"></span>

                    <button class="btn btn-outline-light position-relative mx-2" data-bs-toggle="modal" data-bs-target="#cartModal">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cartCount" class="badge bg-danger position-absolute top-0 start-100 translate-middle">0</span>
                    </button>

                    <button class="btn btn-outline-warning" id="userBtn" title="Cambiar Usuario">
                        <i class="fas fa-user"></i>
                    </button>

                    <button class="btn btn-danger btn-sm ms-2" id="logoutBtn">Salir</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center text-light">
        <div class="container z-3">
            <h1 class="display-3 fw-bold">Conduce la excelencia.</h1>
            <p class="lead">Vehículos de lujo para quienes buscan más que velocidad</p>
        </div>
    </header>

    <main class="container my-5 pt-5">
        <div class="text-center mb-5">
            <h2 class="text-warning fw-bold tracking-widest">NUESTRO INVENTARIO PREMIUM</h2>
            <div class="mx-auto bg-warning" style="height: 2px; width: 60px; margin-top: 10px;"></div>
        </div>
        
        <div class="row g-4" id="productsContainer">
            </div>
    </main>

    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-warning">
                        <i class="fas fa-shopping-bag me-2"></i>Tu Selección Premium
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="cartItems" class="mb-3">
                        </div>
                    
                    <hr class="border-secondary opacity-25">
                    
                    <div class="d-flex justify-content-between align-items-center mb-3 px-2">
                        <h5 class="m-0 fw-light text-secondary">Total a Invertir:</h5>
                        <h4 class="text-warning m-0 fw-bold">
                            <span id="currencySymbol">$</span><span id="cartTotal">0</span>
                        </h4>
                    </div>

                    <div class="row g-3 p-2 bg-black rounded-3 mb-4">
                        <div class="col-6">
                            <label class="form-label small text-secondary">Moneda</label>
                            <select id="currencySelect" class="form-select form-select-sm bg-dark text-light border-secondary">
                                <option value="USD" selected>USD ($)</option>
                                <option value="EUR">EUR (€)</option>
                                <option value="GBP">GBP (£)</option>
                                <option value="JPY">JPY (¥)</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label small text-secondary">Financiación</label>
                            <select id="financeMonths" class="form-select form-select-sm bg-dark text-light border-secondary">
                                <option value="0">Pago al Contado</option>
                                <option value="12">12 meses (7% TAE)</option>
                                <option value="24">24 meses (7% TAE)</option>
                                <option value="36">36 meses (7% TAE)</option>
                                <option value="60">60 meses (7% TAE)</option>
                            </select>
                        </div>
                    </div>

                    <div id="financeResult" class="mt-2 text-center text-success fw-bold small mb-3" style="height: 20px;"></div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-warning py-2 fw-bold" id="simulatePayment">
                            <i class="fas fa-check-circle me-2"></i>RESERVAR AHORA
                        </button>
                        <button class="btn btn-outline-info btn-sm border-0" id="downloadPDF">
                            <i class="fas fa-file-pdf me-2"></i>Generar Cotización PDF
                        </button>
                    </div>
                </div>

                <div class="modal-footer border-secondary justify-content-center">
                    <button class="btn btn-link btn-sm text-secondary text-decoration-none" id="viewHistoryBtn">
                        Historial de Adquisiciones
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
    <script type="module" src="script.js"></script>
  </body>
</html>
